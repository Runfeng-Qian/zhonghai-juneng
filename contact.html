          <div class="f-contact-form-grid">
            <input type="text"  name="name"  class="f-field-input w-input" data-i18n="contact.form_name"  placeholder="Your Name *"  required>

          <div class="f-contact-form-grid">

          </div>
          <div class="f-margin-bottom-44">

          </div>
          <div class="f-margin-bottom-49">
            <textarea name="message" class="f-text-area w-input" data-i18n="contact.form_message" placeholder="Your Message *" required></textarea>
          </div>

          <!-- Sets the subject line of the email Formspree sends you -->

          <div class="f-contact-submit-wrapper">
            <button type="submit" class="f-button-neutral-4" data-i18n="contact.form_submit">Send Message</button>
          </div>

          <span id="msgSending" data-i18n="contact.form_sending" style="display:none"></span>
          <span id="msgSuccess" data-i18n="contact.form_success" style="display:none"></span>
          <span id="msgError"   data-i18n="contact.form_error"   style="display:none"></span>

  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=6500826cc02fd135649122d3" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

  <!-- ============================================
      FORM SCRIPT
      Paste this just before </body>, AFTER the i18n.js <script> line.
      Replace YOUR_FORM_ID with the ID from your Formspree form.
      ============================================ -->
  <script>
    (function () {
      var form = document.getElementById('zsgContactForm');
      if (!form) return;

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        var button = form.querySelector('button[type="submit"]');
        var msg    = document.getElementById('zsgFormMessage');

        var sendingText = (document.getElementById('msgSending') || {}).textContent || 'Sending...';
        var successText = (document.getElementById('msgSuccess') || {}).textContent || 'Thank you for your message.';
        var errorText   = (document.getElementById('msgError')   || {}).textContent || 'Something went wrong. Please try again.';

        var originalBtn = button.textContent;
        button.disabled = true;
        button.textContent = sendingText;
        msg.style.display = 'none';

        try {
          var res = await fetch('https://formspree.io/f/xrevyeww', {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });

          if (res.ok) {
            msg.textContent = successText;
            msg.style.color = '#1f7a1f';
            msg.style.display = 'block';
            form.reset();
          } else {
            msg.textContent = errorText;
            msg.style.color = '#b00020';
            msg.style.display = 'block';
          }
        } catch (err) {
          msg.textContent = errorText;
          msg.style.color = '#b00020';
          msg.style.display = 'block';
        }

        button.disabled = false;
        button.textContent = originalBtn;
      });
    })();
  </script>
